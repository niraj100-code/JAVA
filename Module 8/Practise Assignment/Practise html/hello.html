<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Page</title>
  </head>
  <body>
    <h1>HTML TAGS</h1>
    <br />
    <h2>NAV BAR</h2>
    <header>
      <nav>
        <a href="https://www.flipkart.com/">Flipkart</a><br /><a
          href="https://www.google.com/"
          >Google</a
        ><br /><a href="https://www.linkedin.com/feed/">Linkin</a><br /><a
          href="https://www.youtube.com/"
          >Youtube</a
        >
      </nav>
    </header>

    <div id="form">
      <h2>FORM</h2>
      <form action="/" method="get">
        <label>Name</label>
        <input
          type="text"
          name="name"
          placeholder="Enter Your Name"
          required
        /><br /><br />
        <label>Email</label>
        <input
          type="email"
          name="email"
          id="em"
          placeholder="name@gmail.com"
          required
        /><br /><br />
        <label>Password</label>
        <input
          type="password"
          name="password"
          id="pass"
          placeholder="pas123@HM"
          required
        /><br />
        <button>Submit</button>
      </form>
    </div>
    <br />

    <h2>TABLE</h2>
    <div id="table">
      <table border="5">
        <tr>
          <th>Name</th>
          <th>Sports</th>
          <th>Fees</th>
        </tr>
        <tr>
          <td>Sanjay</td>
          <td>Cricket</td>
          <td>1500</td>
        </tr>
        <tr>
          <td>Jayvir</td>
          <td>HandBall</td>
          <td>2000</td>
        </tr>
      </table>
    </div>
    <br />
    <h2>IMAGE</h2>
    <div id="image">
      <img src="/image.jpeg" alt="Ramji" height="100px" width="100px" />
    </div>
    <br />
    <h2>ORDER LIST & UNORDER LIST</h2>
    <br />
    <h3>ORDER LIST</h3>
    <ol>
      <li>Banana</li>
      <li>Grapes</li>
      <li>Orange</li>
    </ol>
    <h3>UNORDER LIST</h3>
    <ul>
      <li>Sanjay</li>
      <li>Jayvir</li>
      <li>Madhuri</li>
    </ul>
  </body>
</html>
